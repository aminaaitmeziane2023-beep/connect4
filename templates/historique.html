<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historique ♡ Puissance 4 Kawaii</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #fff0f5; color: #7a3055; font-family: 'Nunito', sans-serif; min-height: 100vh; padding: 30px 20px; }
    .container { max-width: 960px; margin: 0 auto; }

    h1 { color: #d63384; font-size: 1.3rem; font-weight: 900; margin-bottom: 22px; border-bottom: 2px dashed #ffb3d1; padding-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
    a.back { font-size: 0.7rem; font-weight: 700; color: #d63384; text-decoration: none; border: 2px solid #ffb3d1; padding: 6px 16px; border-radius: 14px; background: #fff; }
    a.back:hover { background: rgba(214,51,132,0.08); border-color: #d63384; }

    .stats-bar { display: flex; gap: 12px; margin-bottom: 22px; flex-wrap: wrap; }
    .stat-card { background: #fff; border: 2px solid #ffb3d1; border-radius: 16px; padding: 12px 18px; text-align: center; flex: 1; min-width: 120px; box-shadow: 0 2px 10px rgba(255,68,153,0.08); }
    .stat-card .val { font-size: 1.5rem; color: #d63384; font-weight: 900; }
    .stat-card .lbl { font-size: 0.58rem; font-weight: 700; color: #c47a9a; margin-top: 4px; }

    .filters { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: #fff; border: 2px solid #ffb3d1; color: #c47a9a; padding: 7px 16px; border-radius: 14px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.7rem; font-weight: 700; }
    .filter-btn.active { border-color: #d63384; color: #d63384; background: rgba(214,51,132,0.07); }
    .filter-btn:hover { border-color: #d63384; color: #d63384; }

    table { width: 100%; border-collapse: collapse; font-size: 0.68rem; font-weight: 700; }
    thead tr { border-bottom: 2px solid #ffb3d1; color: #d63384; }
    th { padding: 10px 8px; text-align: left; }
    td { padding: 8px 8px; border-bottom: 1px dashed #ffe0ee; color: #7a3055; }
    tr:hover td { background: rgba(255,68,153,0.04); }

    .badge { padding: 3px 10px; border-radius: 10px; font-size: 0.62rem; font-weight: 700; }
    .badge-rouge { background: rgba(255,68,153,0.12); color: #cc0066; }
    .badge-jaune { background: rgba(255,215,0,0.18); color: #b38600; }
    .badge-nul   { background: rgba(200,150,180,0.15); color: #c47a9a; }
    .badge-cours { background: rgba(214,51,132,0.1); color: #d63384; }

    .src-tag { font-size: 0.58rem; padding: 3px 8px; border-radius: 8px; font-weight: 700; }
    .src-app  { background: rgba(255,68,153,0.1); color: #d63384; }
    .src-hist { background: rgba(180,100,200,0.12); color: #9b3cb7; }

    .pagination { display: flex; gap: 8px; margin-top: 18px; justify-content: center; align-items: center; }
    .page-btn { background: #fff; border: 2px solid #ffb3d1; color: #c47a9a; padding: 7px 16px; border-radius: 14px; cursor: pointer; font-family: 'Nunito', sans-serif; font-size: 0.65rem; font-weight: 700; }
    .page-btn:hover, .page-btn.active { border-color: #d63384; color: #d63384; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-info { font-size: 0.65rem; font-weight: 700; color: #c47a9a; }

    .empty { text-align: center; color: #c47a9a; padding: 60px 0; font-size: 0.85rem; font-weight: 700; }
    .loading { text-align: center; color: #d63384; padding: 40px 0; font-size: 0.8rem; font-weight: 700; }

    /* ── Modal Replay ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(255,182,221,0.5); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; }
    .modal-overlay.visible { display:flex; }
    .modal-box { background:#fff; border:3px solid #ffb3d1; border-radius:24px; padding:24px; width:min(520px,95vw); box-shadow:0 8px 40px rgba(255,68,153,0.2); font-family:'Nunito',sans-serif; }
    .modal-title { color:#d63384; font-size:1rem; font-weight:900; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; }
    .modal-close { cursor:pointer; color:#c47a9a; font-size:1.2rem; background:none; border:none; font-weight:900; }
    .replay-grid { display:grid; grid-template-columns:repeat(9,1fr); gap:4px; background:#ffcce0; border:2px solid #ff80be; border-radius:16px; padding:8px; margin:12px 0; }
    .replay-cell { aspect-ratio:1; border-radius:50%; background:#fff0f5; border:2px solid #ffb3d1; }
    .replay-cell.red    { background:#ff4499; border-color:#d63384; }
    .replay-cell.yellow { background:#ffd700; border-color:#e6c200; }
    .replay-controls { display:flex; gap:8px; justify-content:center; align-items:center; margin-top:10px; flex-wrap:wrap; }
    .replay-btn { background:#fff; border:2px solid #ffb3d1; color:#d63384; padding:7px 16px; border-radius:14px; cursor:pointer; font-family:'Nunito',sans-serif; font-size:0.7rem; font-weight:700; }
    .replay-btn:hover { background:#d63384; color:#fff; border-color:#d63384; }
    .replay-btn:disabled { opacity:0.3; cursor:not-allowed; }
    .replay-info { text-align:center; font-size:0.65rem; font-weight:700; color:#c47a9a; margin-top:6px; }
    .btn-replay { background:rgba(214,51,132,0.1); border:2px solid #ffb3d1; color:#d63384; padding:3px 10px; border-radius:10px; cursor:pointer; font-family:'Nunito',sans-serif; font-size:0.6rem; font-weight:700; }
    .btn-replay:hover { background:#d63384; color:#fff; }
  </style>
</head>
<body>
<div class="container">
  <h1>
    ♡ Historique des parties
    <a class="back" href="/">← RETOUR AU JEU</a>
  </h1>

  <div class="stats-bar">
    <div class="stat-card"><div class="val" id="sTotal">—</div><div class="lbl">TOTAL PARTIES</div></div>
    <div class="stat-card"><div class="val" id="sRouge">—</div><div class="lbl">🔴 ROUGE GAGNE</div></div>
    <div class="stat-card"><div class="val" id="sJaune">—</div><div class="lbl">🟡 JAUNE GAGNE</div></div>
    <div class="stat-card"><div class="val" id="sNul">—</div><div class="lbl">⚪ MATCHS NULS</div></div>
  </div>

  <div class="filters">
    <span style="font-size:0.62rem;color:#666;">AFFICHER :</span>
    <button class="filter-btn active" id="f-all"        onclick="setFilter('all')">🗂 Tout</button>
    <button class="filter-btn"        id="f-app"        onclick="setFilter('app')">🎮 Mes parties</button>
    <button class="filter-btn"        id="f-historique" onclick="setFilter('historique')">🗄 Base de données</button>
  </div>

  <div id="tableContainer"><p class="loading">Chargement...</p></div>

  <div class="pagination" id="pagination"></div>
</div>

<script>
let currentFilter = 'all';
let currentPage   = 1;
let totalParties  = 0;
const LIMIT = 50;

async function load() {
  document.getElementById('tableContainer').innerHTML = '<p class="loading">Chargement...</p>';
  try {
    const res  = await fetch(`/api/historique?source=${currentFilter}&page=${currentPage}`);
    const data = await res.json();
    const parties = data.parties || [];
    totalParties  = data.total  || 0;

    // Stats (basées sur la page courante — on recalcule sur tout si page 1)
    if (currentPage === 1) {
      const rouge = parties.filter(p => p.winner === 1).length;
      const jaune = parties.filter(p => p.winner === 2).length;
      const nul   = parties.filter(p => p.winner === 0).length;
      document.getElementById('sTotal').textContent = totalParties.toLocaleString();
      document.getElementById('sRouge').textContent = rouge;
      document.getElementById('sJaune').textContent = jaune;
      document.getElementById('sNul').textContent   = nul;
    }

    if (parties.length === 0) {
      document.getElementById('tableContainer').innerHTML = '<p class="empty">Aucune partie trouvée.</p>';
      renderPagination();
      return;
    }

    let html = `<table>
      <thead><tr>
        <th>#</th><th>DATE</th><th>MODE</th><th>PREMIER JOUEUR</th><th>IA / J2</th><th>RÉSULTAT</th><th>SOURCE</th><th>REPLAY</th>
      </tr></thead><tbody>`;

    for (const p of parties) {
      let badge = '';
      if      (p.winner === 1) badge = '<span class="badge badge-rouge">🔴 Rouge</span>';
      else if (p.winner === 2) badge = '<span class="badge badge-jaune">🟡 Jaune</span>';
      else if (p.winner === 0) badge = '<span class="badge badge-nul">⚪ Nul</span>';
      else                     badge = '<span class="badge badge-cours">⏳ En cours</span>';

      const srcTag = p.source === 'app'
        ? '<span class="src-tag src-app">🎮 appli</span>'
        : '<span class="src-tag src-hist">🗄 BD</span>';

      html += `<tr>
        <td style="color:#555">${p.id}</td>
        <td style="color:#888">${p.date}</td>
        <td style="color:#ccc">${p.mode}</td>
        <td style="color:#ccc">${p.ai1}</td>
        <td style="color:#ccc">${p.ai2}</td>
        <td>${badge}</td>
        <td>${srcTag}</td>
        <td><button class="btn-replay" onclick="openReplay(${p.id})">▶ Revoir</button></td>
      </tr>`;
    }
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
    renderPagination();

  } catch(e) {
    document.getElementById('tableContainer').innerHTML = `<p class="empty" style="color:#f44">Erreur : ${e.message}</p>`;
  }
}

function renderPagination() {
  const totalPages = Math.ceil(totalParties / LIMIT);
  if (totalPages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>◀ Préc.</button>`;
  html += `<span class="page-info">Page ${currentPage} / ${totalPages} (${totalParties} parties)</span>`;
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>Suiv. ▶</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; load(); window.scrollTo(0,0); }

function setFilter(f) {
  currentFilter = f;
  currentPage   = 1;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('f-' + f).classList.add('active');
  load();
}

load();
</script>

<!-- ===== MODAL REPLAY ===== -->
<div class="modal-overlay" id="replayModal">
  <div class="modal-box">
    <div class="modal-title">
      <span>▶ Replay de la partie <span id="replayGameId"></span></span>
      <button class="modal-close" onclick="closeReplay()">✕</button>
    </div>
    <div class="replay-grid" id="replayGrid"></div>
    <div class="replay-info" id="replayInfo">Coup 0</div>
    <div class="replay-controls">
      <button class="replay-btn" id="rBtnFirst"  onclick="replayGo(0)">⏮ Début</button>
      <button class="replay-btn" id="rBtnPrev"   onclick="replayStep(-1)">◀ Préc.</button>
      <button class="replay-btn" id="rBtnNext"   onclick="replayStep(1)">Suiv. ▶</button>
      <button class="replay-btn" id="rBtnLast"   onclick="replayGo(replayStates.length-1)">Fin ⏭</button>
    </div>
  </div>
</div>

<script>
// ── REPLAY ──────────────────────────────────────────────────
let replayStates = [];
let replayCursor = 0;

function openReplay(gameId) {
  document.getElementById('replayGameId').textContent = '#' + gameId;
  document.getElementById('replayInfo').textContent = 'Chargement...';
  document.getElementById('replayModal').classList.add('visible');

  // Construire la grille vide
  const grid = document.getElementById('replayGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 81; i++) {
    const cell = document.createElement('div');
    cell.className = 'replay-cell';
    cell.id = 'rc-' + i;
    grid.appendChild(cell);
  }

  fetch('/api/replay/' + gameId)
    .then(r => r.json())
    .then(data => {
      if (!data.ok) {
        document.getElementById('replayInfo').textContent = '⚠ ' + (data.error || 'Erreur');
        return;
      }
      replayStates = data.states;
      replayCursor = 0;
      replayRender();
    })
    .catch(() => {
      document.getElementById('replayInfo').textContent = '⚠ Erreur de connexion';
    });
}

function closeReplay() {
  document.getElementById('replayModal').classList.remove('visible');
  replayStates = [];
}

function replayRender() {
  if (!replayStates.length) return;
  const s = replayStates[replayCursor];
  const gs = s.grid_str; // 81 chars, row 0 = bas

  // Afficher de haut (row 8) en bas (row 0)
  for (let row = 0; row < 9; row++) {
    for (let col = 0; col < 9; col++) {
      const displayRow = 8 - row; // row 8 en haut visuellement
      const idx = displayRow * 9 + col;
      const cellIdx = row * 9 + col;
      const cell = document.getElementById('rc-' + cellIdx);
      const ch = gs[idx];
      cell.className = 'replay-cell' + (ch === 'R' ? ' red' : ch === 'J' ? ' yellow' : '');
    }
  }

  document.getElementById('replayInfo').textContent =
    'Coup ' + s.ply + ' / ' + (replayStates.length - 1) +
    (s.ply === 0 ? ' — Début de partie' : '');

  document.getElementById('rBtnFirst').disabled = replayCursor === 0;
  document.getElementById('rBtnPrev').disabled  = replayCursor === 0;
  document.getElementById('rBtnNext').disabled  = replayCursor >= replayStates.length - 1;
  document.getElementById('rBtnLast').disabled  = replayCursor >= replayStates.length - 1;
}

function replayStep(dir) {
  replayCursor = Math.max(0, Math.min(replayStates.length - 1, replayCursor + dir));
  replayRender();
}

function replayGo(idx) {
  replayCursor = Math.max(0, Math.min(replayStates.length - 1, idx));
  replayRender();
}

// Fermer le modal en cliquant en dehors
document.getElementById('replayModal').addEventListener('click', function(e) {
  if (e.target === this) closeReplay();
});
</script>
</body>
</html>
